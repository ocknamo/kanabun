<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
      No static <title> here on purpose. The <Title> in main.tsx owns the tab
      title and drives it reactively from the Head/Title card. The browser
      honours only the *first* <title> in tree order, so a static one here would
      shadow the dynamic one and the tab would never update — which is exactly
      the bug this demo is meant to show off the fix for. (main.tsx seeds the
      same initial text, so the tab reads "kanabun — primitives" once mounted.)
    -->
    <style>
      /* Page layout (global). Component styling lives in main.tsx via `css`. */
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font: 16px/1.5 system-ui, sans-serif;
        color: #111;
        background: #f5f5f5;
      }
      #app {
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 2rem 1rem;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
