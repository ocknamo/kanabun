<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kanabun — TodoMVC</title>
    <style>
      body {
        font: 16px/1.4 system-ui, sans-serif;
        background: #f5f5f5;
        color: #111;
        margin: 0;
        padding: 2rem;
      }
      .app {
        max-width: 28rem;
        margin: 0 auto;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
        padding: 1rem 1.25rem 1.25rem;
      }
      h1 {
        font-weight: 200;
        font-size: 2.5rem;
        text-align: center;
        color: #b83f45;
        margin: 0.25rem 0 0.75rem;
      }
      .new-todo {
        width: 100%;
        box-sizing: border-box;
        padding: 0.6rem 0.75rem;
        font-size: 1rem;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      .todo-list {
        list-style: none;
        margin: 0.75rem 0;
        padding: 0;
      }
      .todo-list li {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.45rem 0.1rem;
        border-bottom: 1px solid #eee;
      }
      .todo-list li.completed .title {
        text-decoration: line-through;
        color: #999;
      }
      .todo-list .title {
        flex: 1;
      }
      .todo-list .empty {
        color: #999;
        justify-content: center;
      }
      .destroy {
        border: none;
        background: none;
        color: #cc9a9a;
        cursor: pointer;
        font-size: 1rem;
      }
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        color: #777;
        font-size: 0.85rem;
      }
      .filters button,
      .clear-completed {
        border: 1px solid transparent;
        background: none;
        cursor: pointer;
        color: inherit;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
      }
      .filters button.selected {
        border-color: #b83f4533;
        color: #b83f45;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
