# Bun configuration.
#
# Test + coverage settings live here so local `bun test` and CI agree on what
# "passing" means. Coverage itself is opt-in (collected with `--coverage` or
# the `test:coverage` script) to keep the default `bun test` fast.
[test]
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
# Exclude the *.spec.ts files themselves from the coverage denominator.
coverageSkipTestFiles = true
# Test-only fixtures and example apps are not product code. (The DOM mock now
# ships as part of `@kanabun/testing`, so it is covered like any other source;
# only the router's WindowLike fakes stay ignored by name.)
# `kanabun-generate-fix-*` / `kanabun-serve-fix-*` are the tmp dirs of
# throwaway config modules that `generate.spec.ts` / `cli.spec.ts` import at
# runtime (so they'd otherwise count) — test fixtures, not product code.
coveragePathIgnorePatterns = [
  "**/router-test-utils.ts",
  "**/examples/**",
  "**/kanabun-generate-fix-*/**",
  "**/kanabun-serve-fix-*/**",
]
# Fail the run if coverage drops below this fraction (checked whenever
# coverage is collected). The core is meant to stay fully covered.
coverageThreshold = 0.9
