name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, test & coverage
    runs-on: ubuntu-latest
    # Needed to publish the self-hosted coverage badge to the `badges` branch
    # (only exercised on push to main; see "Publish coverage badge" below).
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # The only toolchain kanabun needs is Bun. No npm dependency install
      # step is required because the project has zero dependencies.
      # Bun version is pinned in `.bun-version` (single source of truth),
      # passed to setup-bun via bun-version-file.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      # Installs the pinned dev-time toolchain (@types/bun + typescript) and
      # verifies the lockfile is in sync. No runtime dependencies exist.
      - name: Install (dev toolchain only)
        run: bun install --frozen-lockfile

      # TypeScript is a pinned dev dependency; bunx resolves the local binary.
      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test with coverage
        run: bun test --coverage --coverage-reporter=text --coverage-reporter=lcov

      # Builds the examples end-to-end: exercises the JSX transform, our
      # jsx-runtime, and browser bundling. Catches JSX/wiring regressions.
      - name: Build examples (browser bundles)
        run: |
          bun build ./examples/counter/main.tsx --target browser --outfile /tmp/counter.js
          bun build ./examples/todomvc/main.tsx --target browser --outfile /tmp/todomvc.js

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

      # Self-hosted coverage badge: derive coverage% from lcov and publish a
      # shields.io endpoint JSON to the orphan `badges` branch. No external
      # coverage service — the README badge reads this JSON's raw URL. Runs
      # only on push to main so PRs (incl. forks) never touch the branch.
      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        run: bun scripts/coverage-badge.ts

      - name: Publish coverage badge
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          worktree="$(mktemp -d)"
          if git ls-remote --exit-code --heads origin badges >/dev/null 2>&1; then
            git fetch --depth=1 origin badges
            git worktree add -B badges "$worktree" origin/badges
          else
            git worktree add --orphan -b badges "$worktree"
          fi
          cp badge/coverage.json "$worktree/coverage.json"
          git -C "$worktree" add coverage.json
          if git -C "$worktree" diff --cached --quiet; then
            echo "Coverage badge unchanged; nothing to publish."
          else
            git -C "$worktree" commit -m "chore: update coverage badge"
            git -C "$worktree" push origin badges
          fi
          git worktree remove --force "$worktree"

  # Visual-regression gate. Runs in Playwright's pinned container so rendering
  # is bit-identical to the environment baselines were captured in. Playwright
  # is CI-only tooling (installed ad-hoc, --no-save) — never a project dep, so
  # the zero-dependency rule holds. Baselines live in tests/visual/__screenshots__
  # and are regenerated by the "Update visual baselines" workflow.
  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-jammy
    steps:
      - uses: actions/checkout@v4

      # The Playwright image is minimal and ships without unzip, which
      # setup-bun needs to unpack the Bun release.
      - name: Install unzip (required by setup-bun)
        run: apt-get update && apt-get install -y --no-install-recommends unzip

      # Bun runs the example dev servers that Playwright screenshots.
      # Version pinned via `.bun-version`, passed with bun-version-file.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      # The test runner, pinned to the container's browser build. --no-save
      # keeps it out of package.json (the browsers are baked into the image).
      - name: Install Playwright test runner (CI-only, not a project dep)
        run: npm install --no-save @playwright/test@1.56.1

      - name: Run visual regression tests
        run: npx playwright test -c tests/visual/playwright.config.cjs

      # Behavioural E2E: drives the real dev server in Chromium to verify CSS
      # hot-swap (style applies without a reload; non-CSS edits reload). Reuses
      # the Playwright + Bun already set up above; spawns its own dev server.
      - name: Run end-to-end tests
        run: npx playwright test -c tests/e2e/playwright.config.cjs

      # On a diff, publish expected/actual/diff PNGs so reviewers can eyeball it.
      - name: Upload diff report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: |
            playwright-report/
            test-results/
            test-results-e2e/
          if-no-files-found: warn

  # Experimental early-warning canary — never gates the build (continue-on-error).
  # Typechecks with the TypeScript 7 native preview (tsgo) so we see divergence
  # from the pinned typescript@6.0.2 (the source of truth in the `verify` job)
  # as the native port heads to GA. tsgo is run ad-hoc via npx so package.json /
  # bun.lock stay untouched; the preview is intentionally unpinned to track
  # upstream. See docs/dx.md — v7 matters most for the future semantic linter.
  typecheck-next:
    name: Typecheck (TS7 native preview, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # Version pinned via `.bun-version`, passed with bun-version-file.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      # Brings in @types/bun so the native compiler can resolve the type surface.
      - name: Install (dev toolchain only)
        run: bun install --frozen-lockfile

      # tsgo ships as a bin inside @typescript/native-preview; npx -p fetches it
      # on demand without writing it to the manifest.
      - name: Typecheck with tsgo
        run: npx -y -p @typescript/native-preview tsgo --noEmit
